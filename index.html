<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们的秘密基地</title>

    <style>
        body, html {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background: #fff5f7;
            background-image: radial-gradient(circle at center, #ffffff 0%, #fff5f7 100%);
            cursor: url('strawberry.cur'), auto;
            font-family: "YouYuan", "幼圆", "Microsoft YaHei", sans-serif;
            font-weight: bold;
        }

        .stars { position: fixed; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); text-shadow: 0 0 10px #fff; }
        }

        .hearts { position: fixed; width: 100%; height: 100%; pointer-events: none; z-index: 2; }

        .heart {
            position: absolute;
            transform: rotate(45deg);
            animation: floatUp linear forwards;
            filter: drop-shadow(0 0 5px rgba(255,182,193,0.6));
        }

        .heart::before, .heart::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: inherit;
            border-radius: 50%;
        }

        .heart::before { top: -50%; left: 0; }
        .heart::after { left: -50%; top: 0; }

        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(45deg) scale(0.5); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(-20vh) rotate(405deg) scale(1.2); opacity: 0; }
        }

        .spark {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #ffb6c1;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            animation: explode 0.8s ease-out forwards;
        }

        @keyframes explode {
            from { transform: scale(1); opacity: 1; }
            to { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }

        .countdown-container {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            text-align: center;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            padding: 12px 30px;
            border-radius: 50px;
            border: 2px solid #ffdae0;
            box-shadow: 0 8px 20px rgba(255,182,193,0.3);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(-50%, 0); }
            50% { transform: translate(-50%, -8px); }
        }

        .countdown-title {
            color: #ff6b81;
            font-size: 15px;
            font-weight: 900;
            margin-bottom: 5px;
        }

        .timer-flex {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .time-unit {
            color: #ff4757;
            font-weight: 900;
            font-size: 24px;
        }

        .time-label {
            font-size: 13px;
            color: #ffa4b0;
            margin-left: 2px;
        }

        #app {
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            background: url('a1.jpg') center/cover;
        }

        #flipbook {
            width: 800px;
            height: 500px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.2);
            position: relative;
            z-index: 5;
        }

        .page {
            background: url('zhizhang.jpg') center/cover;
            background-color: #fff;
        }

        textarea {
            width: 85%;
            height: 80%;
            margin: 40px auto;
            border: none;
            outline: none;
            padding: 20px;
            font-family: "YouYuan", "幼圆", "Microsoft YaHei";
            font-size: 18px;
            font-weight: bold;
            color: #7c5a5a;
            background: transparent;
            resize: none;
            line-height: 1.8;
            display: block;
            border-bottom: 1px dashed #ffdae0;
        }

        .hard {
            background: url('kawai.jpg') center/cover;
            background-color: #ffb6c1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            color: #fff;
            font-weight: 900;
        }
    </style>
</head>
<body>

<div id="countdown" class="countdown-container">
    <div class="countdown-title">见到你的瑾宝</div>
    <div class="timer-flex">
        <div><span class="time-unit" id="days">00</span><span class="time-label">天</span></div>
        <div><span class="time-unit" id="hours">00</span><span class="time-label">时</span></div>
        <div><span class="time-unit" id="minutes">00</span><span class="time-label">分</span></div>
        <div><span class="time-unit" id="seconds">00</span><span class="time-label">秒</span></div>
    </div>
</div>

<div class="stars"></div>
<div class="hearts"></div>

<div id="app">
    <div id="flipbook">
        <div class="hard">我们的日记</div>
        <div class="page"><textarea data-id="p1"></textarea></div>
        <div class="page"><textarea data-id="p2"></textarea></div>
        <div class="page"><textarea data-id="p3"></textarea></div>
        <div class="page"><textarea data-id="p4"></textarea></div>
        <div class="page"><textarea data-id="p5"></textarea></div>
        <div class="page"><textarea data-id="p6"></textarea></div>
        <div class="page"><textarea data-id="p7"></textarea></div>
        <div class="page"><textarea data-id="p8"></textarea></div>
        <div class="page"><textarea data-id="p9"></textarea></div>
        <div class="page"><textarea data-id="p10"></textarea></div>
        <div class="hard">未完待续... 🍓</div>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/turn.js/3/turn.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyBgNcYToqEte2cO9MAMm1WwfepG8FzTwk",
    authDomain: "diary-love.firebaseapp.com",
    databaseURL: "https://diary-love-default-rtdb.firebaseio.com/",
    projectId: "diary-love",
    storageBucket: "diary-love.firebasestorage.app",
    messagingSenderId: "133217739741",
    appId: "1:133217739741:web:40788b0426991d11e60c34"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const targetDate = new Date("April 30, 2026 20:00:00").getTime();

function updateCountdown() {
    const now = new Date().getTime();
    const gap = targetDate - now;

    if (gap <= 0) {
        document.getElementById('countdown').innerHTML = "<div class='countdown-title'>🎉见面啦！我爱你！🎉</div>";
        return;
    }

    document.getElementById("days").innerText = Math.floor(gap / (1000 * 60 * 60 * 24));
    document.getElementById("hours").innerText = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    document.getElementById("minutes").innerText = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));
    document.getElementById("seconds").innerText = Math.floor((gap % (1000 * 60)) / 1000);
}

function initSync() {
    $('textarea').each(function () {
        const el = this;
        const id = $(this).attr('data-id');
        let timer;

        db.ref('diary/' + id).on('value', snap => {
            if (document.activeElement !== el) {
                el.value = snap.val() || "";
            }
        });

        $(this).on('input', function () {
            clearTimeout(timer);
            const val = this.value;

            timer = setTimeout(() => {
                db.ref('diary/' + id).set(val);
            }, 500);
        });
    });
}

window.onload = function () {
    $('#flipbook').turn({
        width: 800,
        height: 500,
        autoCenter: true,
        duration: 1000
    });

    initSync();
    updateCountdown();
    setInterval(updateCountdown, 1000);
};
</script>

</body>
</html>
